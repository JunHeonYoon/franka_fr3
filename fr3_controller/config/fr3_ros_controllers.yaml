/**:
  controller_manager:
    ros__parameters:
      update_rate: 1000  # Hz
      thread_priority: 98

      left_franka_robot_state_broadcaster:
        type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

      right_franka_robot_state_broadcaster:
        type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      left_test_fr3_controller:
        type: fr3_controller/TestFr3Controller

      right_test_fr3_controller:
        type: fr3_controller/TestFr3Controller

      dual_test_fr3_controller:
        type: fr3_controller/TestFr3Controller

  left_franka_robot_state_broadcaster:
    ros__parameters:
      arm_id: fr3
      interface_prefix: left
      lock_try_count: 5
      lock_sleep_interval: 5
      lock_log_error: false
      lock_update_success: true

  right_franka_robot_state_broadcaster:
    ros__parameters:
      arm_id: fr3
      interface_prefix: right
      lock_try_count: 5
      lock_sleep_interval: 5
      lock_log_error: false
      lock_update_success: true

  left_test_fr3_controller:
    ros__parameters:
      update_rate: 1000  # Hz
      robot_name: ["left"]
      manipulator_joints:
        - left_fr3_joint1
        - left_fr3_joint2
        - left_fr3_joint3
        - left_fr3_joint4
        - left_fr3_joint5
        - left_fr3_joint6
        - left_fr3_joint7
      manipulator_state_interfaces:
        - position
        - velocity
        - effort
      manipulator_command_interface: effort

  right_test_fr3_controller:
    ros__parameters:
      update_rate: 1000  # Hz
      robot_name: ["right"]
      manipulator_joints:
        - right_fr3_joint1
        - right_fr3_joint2
        - right_fr3_joint3
        - right_fr3_joint4
        - right_fr3_joint5
        - right_fr3_joint6
        - right_fr3_joint7
      manipulator_state_interfaces:
        - position
        - velocity
        - effort
      manipulator_command_interface: effort

  dual_test_fr3_controller:
    ros__parameters:
      update_rate: 1000  # Hz
      robot_name: ["left", "right"]
      manipulator_joints:
        - left_fr3_joint1
        - left_fr3_joint2
        - left_fr3_joint3
        - left_fr3_joint4
        - left_fr3_joint5
        - left_fr3_joint6
        - left_fr3_joint7
        - right_fr3_joint1
        - right_fr3_joint2
        - right_fr3_joint3
        - right_fr3_joint4
        - right_fr3_joint5
        - right_fr3_joint6
        - right_fr3_joint7
      manipulator_state_interfaces:
        - position
        - velocity
        - effort
      manipulator_command_interface: effort
